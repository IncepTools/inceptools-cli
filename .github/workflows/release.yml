name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="inceptools-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -trimpath -o "dist/${BINARY_NAME}" .

          # Create archive for Homebrew and manual install
          cd dist
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip "inceptools-${{ matrix.os }}-${{ matrix.arch }}.zip" "$BINARY_NAME"
          else
            tar -czf "inceptools-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" "$BINARY_NAME"
          fi
          cd ..

      - name: Build .deb package (Linux only)
        if: matrix.os == 'linux'
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh ${{ github.ref_name }} ${{ matrix.arch }}

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-${{ matrix.os }}-${{ matrix.arch }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Merge checksums
        run: |
          cd dist
          cat checksums-*.txt > checksums.txt
          rm checksums-*.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/inceptools-*
            dist/*.deb
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
