name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist

          BINARY_NAME="inceptools-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi

          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -trimpath \
            -o "dist/$BINARY" .

      - name: Package Archive
        run: |
          cd dist

          for file in inceptools-*; do
            if [[ "$file" == *.exe ]]; then
              zip "${file%.exe}.zip" "$file"
            else
              tar -czf "$file.tar.gz" "$file"
            fi
          done

      - name: Build Debian Package (Linux only)
        if: matrix.os == 'linux'
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh ${{ github.ref_name }} ${{ matrix.arch }}

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum * > checksums-${{ matrix.os }}-${{ matrix.arch }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 1


  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Merge Checksums
        run: |
          cd dist
          cat checksums-* > checksums.txt
          rm checksums-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Update Homebrew Formula
        run: |
          VERSION=${{ github.ref_name }}
          V_STR=${VERSION#v}

          SHA_DARWIN_AMD64=$(sha256sum dist/inceptools-darwin-amd64.tar.gz | cut -d ' ' -f1)
          SHA_DARWIN_ARM64=$(sha256sum dist/inceptools-darwin-arm64.tar.gz | cut -d ' ' -f1)
          SHA_LINUX_AMD64=$(sha256sum dist/inceptools-linux-amd64.tar.gz | cut -d ' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum dist/inceptools-linux-arm64.tar.gz | cut -d ' ' -f1)

          sed -i "s/{{VERSION}}/${V_STR}/g" Formula/inceptools.rb
          sed -i "s/{{SHA256_DARWIN_AMD64}}/${SHA_DARWIN_AMD64}/g" Formula/inceptools.rb
          sed -i "s/{{SHA256_DARWIN_ARM64}}/${SHA_DARWIN_ARM64}/g" Formula/inceptools.rb
          sed -i "s/{{SHA256_LINUX_AMD64}}/${SHA_LINUX_AMD64}/g" Formula/inceptools.rb
          sed -i "s/{{SHA256_LINUX_ARM64}}/${SHA_LINUX_ARM64}/g" Formula/inceptools.rb

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout main

          git add Formula/inceptools.rb
          git commit -m "chore: update homebrew formula to ${VERSION}" || echo "No changes"
          git push origin main || echo "Push skipped"
